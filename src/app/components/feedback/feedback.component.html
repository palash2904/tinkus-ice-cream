<section class="section section-alt" id="feedback">
  <div class="container">
    <div class="fb-header" appScrollReveal>
      <span class="section-tag">Customer Love</span>
      <h2 class="section-title">What People Are Saying</h2>
      <p class="section-sub">Real reviews from real customers who tasted the difference.</p>
    </div>
    <div class="reviews-scroll">
      <div class="review-card" *ngFor="let r of reviews; let i = index" appScrollReveal [revealDelay]="i * 70">
        <div class="review-stars">
          <span *ngFor="let s of stars(r.rating)">★</span>
        </div>
        <p class="review-text">"{{r.text}}"</p>
        <div class="review-author">
          <div class="review-avatar">{{r.avatar}}</div>
          <div>
            <strong>{{r.name}}</strong>
            <span>{{r.city}}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="feedback-form-wrap" appScrollReveal revealDirection="scale">
      <h3>Share Your Experience</h3>
      <div *ngIf="submitted()" class="success-msg">
        🎉 Thank you for your feedback! We love hearing from you.
      </div>
      <div *ngIf="!submitted()" class="feedback-form">
        <div class="form-row">
          <div class="form-group">
            <label>Your Name *</label>
            <input type="text" [(ngModel)]="formData.name" placeholder="Priya Sharma">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="formData.email" placeholder="priya@email.com">
          </div>
        </div>
        <div class="form-group">
          <label>Rating *</label>
          <div class="star-picker">
            <span
              *ngFor="let s of [1,2,3,4,5]"
              class="star"
              [class.filled]="s <= formData.rating || s <= hoverRating()"
              (mouseenter)="hoverRating.set(s)"
              (mouseleave)="hoverRating.set(0)"
              (click)="setRating(s)">★</span>
          </div>
        </div>
        <div class="form-group">
          <label>Your Review *</label>
          <textarea [(ngModel)]="formData.message" rows="4" placeholder="Tell us about your experience with Tinku's ice cream..."></textarea>
        </div>
        <button class="btn-primary" (click)="submitFeedback()">Submit Review →</button>
      </div>
    </div>
  </div>
</section>
